    ref: conversation:codex:019f7530-9694-7ec3-99c4-0c8052dd2478#42
    role: choice
  id: reconstructed-install-init
  statement: Installation manages both local skills and the marked AGENTS block, initializes the canonical store, and verifies readiness without replacing divergent local files.
- evidence:
  - observed_at: 2026-07-17T07:06:46.448Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#1180
    role: choice
  id: reconstructed-automatic-context
  statement: Use Project Context automatically for non-trivial repository work; invoke reconstruction only when historical recovery is explicitly requested.
- evidence:
  - observed_at: 2026-07-18T12:57:45.048Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#68
    role: choice
  - observed_at: 2026-07-18T16:51:55.429Z
