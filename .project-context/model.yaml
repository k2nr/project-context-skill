    role: choice
  id: reconstructed-project-local-install
  statement: Install Project Context as repository-local skills under .agents/skills, with the primary skill automatic and reconstruction a separately invoked companion.
- evidence:
  - observed_at: 2026-07-17T05:48:56.811Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#385
