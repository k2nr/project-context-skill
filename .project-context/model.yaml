    role: choice
  - observed_at: 2026-07-19T06:34:47.501Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#3314
    role: choice
  id: reconstructed-scope-gate
  statement: When reconstruction sources are unspecified, inspect metadata only and ask one combined scope question before reading history content.
- evidence:
  - observed_at: 2026-07-19T08:07:10.832Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#330
    role: choice
  - observed_at: 2026-07-19T14:53:54.107Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#4365
    role: choice
  - observed_at: 2026-07-21T08:00:30.117Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#5552
    role: choice
  - observed_at: 2026-07-21T08:01:07.683Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#6577
    role: choice
  - observed_at: 2026-07-21T08:14:38.432Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#7718
    role: choice
  id: reconstructed-complete-user-audit
  statement: Audit every direct-user decision signal separately so short approvals, corrections, and quoted proposals cannot be hidden by ordinary record coverage.
- event_relations:
  - event: D-0031
    kind: origin
  - event: D-0032
    kind: constraint
  evidence:
  - ref: file:reconstruct-project-context/scripts/inventory_local_history.py
    role: implementation
  id: tracked-document-completeness
  statement: Reconstruction audits every selected tracked-document block, requires complete line-origin commits or matching direct-user support for durable candidates, and never persists document paths as canonical evidence.
- evidence:
  - ref: commit:b1d65e293e763b06715ccd821b2de7bfe75baaac
    role: implementation
  id: reconstructed-qualified-auto-apply
  statement: Automatically apply only evidence-qualified reconstruction candidates after coverage, candidate, schema, reference, and base-conflict gates pass.
- event_relations:
  - event: D-0028
    kind: rationale
  evidence:
  - observed_at: 2026-07-19T11:55:22.913Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#849
    role: choice
  - observed_at: 2026-07-19T14:53:54.109Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#4594
