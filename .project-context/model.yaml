    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#521
    role: choice
  id: reconstructed-cli-surface
  statement: Use the project-local launcher as the stable interface for initialization, validation, retrieval, event mutation, installation diagnosis, reconstruction checking/application, and updates.
- event_relations:
  - event: D-0022
    kind: rationale
  evidence:
  - ref: commit:6eae90d2425211cf6ada25de3dbfa253762a8fd1
    role: implementation
  id: reconstructed-store-layout
  statement: Store canonical intent in .project-context with schema-versioned model.yaml and append-oriented events.jsonl plus repository schema copies.
- event_relations:
  - event: D-0030
    kind: rationale
  evidence:
  - ref: commit:59f896b0bc7ec9a39e5498787fbf12815a6dfa81
    role: implementation
  id: reconstructed-reconstruction-pipeline
  statement: Reconstruct through a frozen inventory, complete coverage audit, independent candidates, a side-effect-free check, and transactional apply against opaque base snapshots.
- evidence:
  - observed_at: 2026-07-18T13:04:52.932Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#151
    role: choice
  - observed_at: 2026-07-18T16:51:55.431Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#2528
    role: choice
  - observed_at: 2026-07-19T06:34:47.503Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#3375
    role: choice
  id: reconstructed-reconstruction-mode
  statement: Package reconstruction as a separate repository-local, local-evidence-only companion that applies qualified results automatically after its gates pass.
- evidence:
  - ref: commit:e5e0eff76a18c86996267119238de428453f8c65
    role: implementation
  id: reconstructed-dev-environment
  statement: Use Devbox as the one-command reproducible development and validation environment, including ShellCheck and PyYAML.
behaviors:
- event_relations:
  - event: D-0004
    kind: origin
  evidence:
  - ref: commit:e1c761d3136cef9dc065a54a2d1daa1b5acce3af
    role: implementation
  id: automatic-context-retrieval
  statement: For non-trivial repository work, retrieve relevant current intent and connected decision or attempt history without waiting for explicit invocation.
- event_relations:
  - event: D-0016
    kind: origin
  evidence:
  - ref: file:cli/src/store.rs
    role: implementation
  id: timeline-event-log
  statement: Keep event JSONL in chronological order; prefer explicit occurred_at and otherwise preserve stable same-date evidence order.
- event_relations:
  - event: D-0009
    kind: origin
  - event: D-0012
    kind: implementation
  evidence:
  - ref: commit:b1d65e293e763b06715ccd821b2de7bfe75baaac
    role: implementation
  id: scope-gated-reconstruction
  statement: Ask one source-scope question before substantive reconstruction when the user has not already selected sources, then automatically apply qualified candidates after both coverage gates pass.
- event_relations:
  - event: D-0015
    kind: origin
  evidence:
  - ref: commit:8c750a1c87336d171b65870dcaa5195eeef921af
    role: implementation
  id: explicit-safe-update
  statement: The project-context update workflow performs a verified dry run before applying and stops on local managed-file drift.
- event_relations:
  - event: D-0005
    kind: implementation
  evidence:
  - ref: file:cli/src/context.rs
    role: implementation
  id: connected-context-packets
  statement: Context retrieval preserves model section shapes, scores file and Git evidence, and returns supersession components as indivisible historical units within a strict output budget.
- event_relations:
  - event: D-0023
    kind: rationale
  evidence:
  - observed_at: 2026-07-17T07:02:30.320Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#1137
    role: choice
  - observed_at: 2026-07-17T07:04:31.959Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#1153
