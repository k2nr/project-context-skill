architecture:
- event_relations:
  - event: D-0012
    kind: implementation
  - event: D-0007
    kind: origin
  evidence:
  - ref: commit:b1d65e293e763b06715ccd821b2de7bfe75baaac
    role: implementation
  id: repository-installed-skills
  statement: Target repositories contain an automatically loaded project-context skill, an explicitly invoked reconstruct-project-context companion, a managed AGENTS block, and a .project-context store.
- event_relations:
  - event: D-0002
    kind: origin
  evidence:
  - ref: file:cli/src/main.rs
    role: implementation
  - ref: file:project-context/bin/project-context
    role: implementation
  id: rust-cli-launcher
  statement: A Rust CLI owns canonical validation, retrieval, mutation, migration, and atomic reconstruction; a project-local launcher fetches verified prebuilt release binaries for supported targets.
- event_relations:
  - event: D-0032
    kind: origin
  evidence:
  - ref: file:project-context/assets/init/model.schema.json
    role: implementation
  - ref: file:project-context/assets/init/event.schema.json
    role: implementation
  id: schema-v3-store
  statement: New stores use schema v3 structured evidence and forbid tracked-document paths as canonical evidence; schema v1 and v2 remain readable and migrate atomically after explicit evidence repair.
- event_relations:
  - event: D-0005
    kind: implementation
  evidence:
  - ref: file:cli/src/store.rs
    role: implementation
  id: transactional-canonical-store
  statement: Canonical initialization, migration, mutation, and reconstruction use locking, validation, typed transactions, crash recovery, atomic replacement, and base-state conflict detection.
- event_relations:
  - event: D-0008
    kind: origin
  - event: D-0015
    kind: implementation
  evidence:
  - ref: file:bin/install-project-context
    role: implementation
  - ref: file:project-context/bin/update-project-context
    role: implementation
  id: verified-distribution
  statement: Standalone installer and updater artifacts verify checksums, available attestations, archive shape, managed-file identity, and rollback boundaries before publishing writes.
- event_relations:
  - event: D-0012
    kind: origin
  - event: D-0010
    kind: constraint
  evidence:
  - ref: file:reconstruct-project-context/scripts/inventory_local_history.py
    role: implementation
  id: frozen-local-inventory
  statement: Reconstruction freezes approved Git, tracked documentation, and repository-associated Codex or Claude sources into a private inventory, verifies record, document-block, and decision coverage, then applies one integrated candidate set.
- evidence:
