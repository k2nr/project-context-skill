  - observed_at: 2026-07-21T08:00:30.122Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#5781
    role: choice
  - observed_at: 2026-07-21T08:01:07.689Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#6806
    role: choice
  - observed_at: 2026-07-21T08:14:38.436Z
    ref: conversation:codex:019f7955-8f1a-74e3-878e-1f752a65f2a0#7947
    role: choice
  id: reconstructed-timeline-semantics
  statement: Keep events in chronological order, using occurred_at only for explicit decision choice or attempt outcome time and preserving unknown-time barriers.
- evidence:
  - observed_at: 2026-07-19T11:59:04.274Z
    ref: conversation:codex:019f7a3d-2a0d-7163-aa37-3c9c5a4c335f#8
    role: choice
  id: reconstructed-safe-update
  statement: The skill-owned update workflow replaces only a pristine verified installation with a verified latest release and rolls back all installer-owned targets on failure.
constraints:
- event_relations:
  - event: D-0010
    kind: origin
  evidence:
  - ref: commit:0a2ac1452ec9c7223aac566428d13233a6cedfdb
    role: implementation
  id: local-reconstruction-only
  statement: Reconstruction may use approved local repository data and repository-associated local Codex or Claude sessions, but never external services or unrelated conversations.
- event_relations:
  - event: D-0014
    kind: origin
  evidence:
  - ref: commit:0a2ac1452ec9c7223aac566428d13233a6cedfdb
    role: implementation
  id: canonical-blindness
  statement: Current and historical .project-context/model.yaml and events.jsonl are never reconstruction evidence; base snapshots are opaque preservation and concurrency inputs only.
- event_relations:
  - event: D-0002
    kind: constraint
  evidence:
  - ref: commit:e1c761d3136cef9dc065a54a2d1daa1b5acce3af
    role: implementation
  id: supported-platforms
  statement: Published prebuilt binaries support macOS 11 or newer and GNU Linux with glibc 2.31 or newer on x86_64 and arm64; musl, Windows, and other targets are unsupported.
- event_relations:
  - event: D-0008
    kind: constraint
  - event: D-0015
    kind: constraint
  evidence:
  - ref: commit:168e350cff01f9df3d4a898c2afa97c4e0534922
    role: implementation
  id: managed-drift-is-conflict
  statement: Install and update never overwrite differing installed skills or malformed or locally modified managed AGENTS content; conflict exits require human direction.
- event_relations:
  - event: D-0011
    kind: origin
  evidence:
  - ref: commit:b1d65e293e763b06715ccd821b2de7bfe75baaac
    role: implementation
  id: release-work-is-separate
  statement: Feature implementation does not implicitly choose a next version, create tags, publish releases, or add unspecified automatic upgrades.
- event_relations:
  - event: D-0006
    kind: origin
  evidence:
  - ref: commit:e1c761d3136cef9dc065a54a2d1daa1b5acce3af
    role: implementation
  id: project-commit-rules-first
  statement: Project-specific commit rules take precedence; Project Context commit guidance applies only where compatible.
- event_relations:
  - event: D-0012
    kind: implementation
  evidence:
  - ref: file:bin/package-skill
    role: implementation
  id: two-skill-package-boundary
  statement: The distributable skill package contains exactly project-context and reconstruct-project-context as top-level skill directories, with development sources and artifacts excluded.
- evidence:
  - observed_at: 2026-07-17T05:16:20.256Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#8
    role: choice
  id: reconstructed-public-english
  statement: Keep publicly distributed skill files, documentation, code comments, and release-facing content in English.
- evidence:
  - observed_at: 2026-07-17T06:51:13.828Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#1077
    role: choice
  id: reconstructed-no-docs-directory
  statement: Do not add a standalone docs directory; keep necessary public guidance with the skills and README.
- evidence:
  - observed_at: 2026-07-17T06:34:27.972Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#928
    role: choice
  id: reconstructed-bin-layout
  statement: Use bin rather than scripts for executable entrypoints and keep LICENSE files at the correct package roots.
- evidence:
  - ref: commit:b1d65e293e763b06715ccd821b2de7bfe75baaac
    role: implementation
  id: reconstructed-no-external-reconstruction
  statement: Reconstruction must not access external services or the network, and ignored files are never evidence.
- event_relations:
  - event: D-0027
    kind: rationale
  evidence:
  - ref: commit:0a2ac1452ec9c7223aac566428d13233a6cedfdb
    role: implementation
  id: reconstructed-canonical-blindness
  statement: Never use current or historical .project-context model.yaml or events.jsonl as reconstruction evidence; treat bases only as opaque preservation and conflict inputs.
- evidence:
  - ref: commit:b1d65e293e763b06715ccd821b2de7bfe75baaac
    role: implementation
  id: reconstructed-version-separation
  statement: Do not select a future version, publish a release, or upgrade a divergent installation as a side effect of unrelated feature work.
- event_relations:
  - event: D-0021
    kind: rationale
  evidence:
  - observed_at: 2026-07-17T05:59:12.241Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#521
    role: context
  id: reconstructed-project-rules-first
  statement: Apply Project Context commit guidance only where it does not conflict with repository-specific commit rules.
extensions: {}
operations:
  build:
  - command: devbox run build
    description: Build the locked Rust CLI through the reproducible development environment.
  format:
  - command: devbox run format
    description: Check Rust formatting.
  lint:
  - command: devbox run lint
    description: Run Clippy, ShellCheck, shell syntax checks, and both skill validators.
  test:
  - command: devbox run test
    description: Run Rust and repository integration tests.
  verify:
  - command: devbox run verify
    description: Run the complete build, format, lint, and test gate.
principles:
- event_relations:
  - event: D-0003
    kind: origin
  evidence:
  - ref: commit:e1c761d3136cef9dc065a54a2d1daa1b5acce3af
    role: implementation
  id: ai-agent-interface
  statement: Optimize canonical context and workflows for AI consumption in solo projects where the human uses an AI agent as the codebase interface.
- evidence:
  - ref: commit:e1c761d3136cef9dc065a54a2d1daa1b5acce3af
    role: implementation
  id: durable-only
  statement: Persist only intent, rationale, or costly findings that cannot be recovered reliably from current code, tests, schemas, and Git.
- event_relations:
  - event: D-0014
    kind: rationale
  - event: D-0032
    kind: constraint
  evidence:
  - ref: commit:db8fe7a7444cd243049176568fe121b140302434
    role: implementation
  id: evidence-before-conclusions
  statement: Reconstruction conclusions must cover every selected source, tracked-document block, and direct-user signal with non-document evidence, and never use canonical model/events as truth.
- event_relations:
  - event: D-0005
    kind: origin
  evidence:
  - ref: commit:168e350cff01f9df3d4a898c2afa97c4e0534922
    role: implementation
  id: preserve-local-state
  statement: Install, update, migration, and reconstruction operations fail closed on conflicts and preserve unrelated local state.
- evidence:
  - observed_at: 2026-07-17T06:58:43.277Z
    ref: conversation:codex:019f6e7f-d2ff-7e01-bfc4-e2c882d47a27#1121
    role: choice
  id: reconstructed-agent-interface
  statement: Optimize durable context for AI-agent retrieval in solo projects where the human works through the agent rather than reading specifications.
- evidence:
  - ref: commit:0a2ac1452ec9c7223aac566428d13233a6cedfdb
    role: implementation
  id: reconstructed-evidence-discipline
  statement: Persist only durable intent supported by frozen local evidence, keeping inferred rationale, transcripts, secrets, and routine failures out of canonical context.
- evidence:
  - observed_at: 2026-07-18T16:44:19.137Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#260
    role: choice
  - observed_at: 2026-07-18T16:45:33.819Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#290
    role: choice
  - observed_at: 2026-07-18T16:51:55.433Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#2621
    role: choice
  - observed_at: 2026-07-18T16:51:55.434Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#2646
    role: choice
  - observed_at: 2026-07-19T06:34:47.504Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#3468
    role: choice
  - observed_at: 2026-07-19T06:34:47.505Z
    ref: conversation:codex:019f7545-e98f-7151-9b85-f281d9263229#3493
    role: choice
  id: reconstructed-local-privacy
  statement: Keep history reconstruction local and limit conversation evidence to sessions whose metadata associates them with the repository or a shared-Git worktree.
project:
  description: A repository-installed skill and CLI that preserve, retrieve, reconstruct, and safely evolve durable project intent for AI-agent-driven software projects.
  id: project-context-skill
schema_version: 3
