schema_version: 1
project:
  id: project-context-skill
  description: Repository-local durable project intent and history for AI coding agents.
principles: []
architecture:
  - id: verified-installer-boundary
    statement: The standalone installer is a checksummed and attested release asset that verifies the skill package before repository writes and delegates canonical model mutation to the CLI.
    related_events:
      - D-0001
behaviors:
  - id: safe-installation
    statement: Installation supports preflight and dry-run reports, refuses differing local skill files or malformed managed markers, preserves existing history, and cleans private temporary state on every exit.
    related_events:
      - D-0001
constraints: []
operations:
  build:
    - cargo build --locked --manifest-path cli/Cargo.toml
  test:
    - cargo test --locked --manifest-path cli/Cargo.toml
    - tests/test-bootstrap.sh project-context/bin/project-context
    - tests/test-skill-validator.sh
    - tests/test-package.sh
    - tests/test-installer-package.sh
    - tests/test-installer.sh
  lint:
    - cargo clippy --locked --manifest-path cli/Cargo.toml --all-targets -- -D warnings
    - shellcheck project-context/bin/project-context bin/* tests/*.sh
  format:
    - cargo fmt --manifest-path cli/Cargo.toml -- --check
extensions: {}
